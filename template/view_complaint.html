<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Complaints</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1e1e2f, #2b2b4a);
        color: #fff;
        min-height: 100vh;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
    }

    .header h2 {
        font-weight: 600;
    }

    .header a {
        margin-left: 10px;
        padding: 8px 15px;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        font-size: 14px;
        transition: 0.3s;
    }

    .add-btn {
        background: #28a745;
    }

    .logout-btn {
        background: #dc3545;
    }

    .header a:hover {
        opacity: 0.8;
    }

    .table-container {
        width: 90%;
        margin: 20px auto;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        color: #fff;
    }

    th {
        background: rgba(255,255,255,0.15);
        padding: 12px;
        font-weight: 500;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
        background: rgba(255,255,255,0.05);
    }

    .action-btn {
        padding: 6px 12px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        margin: 2px;
        display: inline-block;
    }

    .edit {
        background: orange;
        color: #fff;
    }

    .delete {
        background: red;
        color: #fff;
    }

    .action-btn:hover {
        transform: scale(1.05);
    }

    .empty {
        text-align: center;
        padding: 20px;
        color: #ccc;
    }

</style>
</head>
<body>

<div class="header">
    <h2>My Complaints</h2>
    <div>
        <a href="{% url 'complaintreg' %}" class="add-btn">+ Add Complaint</a>
        <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </div>
</div>

<div class="table-container">
    <table>
        <tr>
            <th>Username</th>
            <th>Title</th>
            <th>Description</th>
            <th>Class</th>
            <th>Category</th>
            <th>Action</th>
        </tr>

        {% if complaint %}
            {% for c in complaint %}
            <tr>
                <td>{{ c.username }}</td>
                <td>{{ c.title }}</td>
                <td>{{ c.description }}</td>
                <td>{{ c.student_class }}</td>
                <td>{{ c.category }}</td>
                <td>
                    <a class="action-btn edit" href="{% url 'update' c.id %}">Edit</a>
                    <a class="action-btn delete" href="{% url 'delete' c.id %}" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="6" class="empty">No complaints found 😔</td>
            </tr>
        {% endif %}
    </table>
</div>

</body>
</html>

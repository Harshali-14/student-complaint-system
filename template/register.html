<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #2b2b4a);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        width: 380px;
        padding: 30px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        text-align: center;
        color: #fff;
    }

    h2 {
        margin-bottom: 20px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    input::placeholder {
        color: #bbb;
    }

    input:focus {
        background: rgba(255,255,255,0.2);
        box-shadow: 0 0 8px #6c63ff;
    }

    .password-box {
        position: relative;
    }

    .toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 12px;
        color: #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #6c63ff, #4a47a3);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #7d76ff, #5a57c0);
    }

    .link {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #bbb;
        font-size: 14px;
    }

    .link:hover {
        color: #fff;
    }

    .footer {
        margin-top: 10px;
        font-size: 12px;
        color: #aaa;
    }

    .message {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        font-size: 14px;
    }

    .error {
        background: rgba(255,0,0,0.2);
        color: #ff6b6b;
    }

    .success {
        background: rgba(0,255,0,0.2);
        color: #7dffb3;
    }

</style>
</head>

<body>

<div class="box">
    <h2>📝 Create Account</h2>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" onsubmit="return validatePassword()">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="email" name="email" placeholder="Enter Email" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Enter Password" required>
            <span class="toggle" onclick="togglePassword('password')">Show</span>
        </div>

        <div class="password-box">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            <span class="toggle" onclick="togglePassword('confirm_password')">Show</span>
        </div>

        <div id="errorMsg" style="font-size:12px; color:#ff6b6b;"></div>

        <button type="submit">Register</button>
    </form>

    <a href="{% url 'signin' %}" class="link">Already have an account? Login</a>

    <div class="footer">
        Student Complaint System
    </div>
</div>

<script>
function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function validatePassword() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm_password").value;
    let error = document.getElementById("errorMsg");

    if (pass !== confirm) {
        error.innerText = "Passwords do not match!";
        return false;
    }

    if (pass.length < 6) {
        error.innerText = "Password must be at least 6 characters!";
        return false;
    }

    return true;
}
</script>

</body>
</html>
